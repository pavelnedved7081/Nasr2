name: Debug aja.ir RSS full dump

on:
  workflow_dispatch:
    inputs:
      rssUrl:
        description: 'aja.ir (Artesh) RSS feed URL'
        required: true
        type: string
        default: "https://www.aja.ir/portal/rsspage/?fa-ir/news/45459/45608/اخبار"

jobs:
  dump:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Fetch and dump full Artesh RSS feed (title/guid/pubDate/link)
        env:
          AJA_PROXY_URL: ${{ secrets.AJA_PROXY_URL }}
          AJA_PROXY_SECRET: ${{ secrets.AJA_PROXY_SECRET }}
        run: node scripts/debug-aja-rss-dump.mjs "${{ inputs.rssUrl }}"
