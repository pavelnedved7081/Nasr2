name: Debug aja.ir Cloudflare Worker proxy

on:
  workflow_dispatch:
    inputs:
      workerUrl:
        description: 'Cloudflare Worker base URL'
        required: true
        type: string
        default: "https://aja-proxy.pavelnedved7081.workers.dev"
      targetUrl:
        description: 'aja.ir URL to fetch through the proxy'
        required: true
        type: string
        default: "https://www.aja.ir/portal/rsspage/?fa-ir/news/45459/45608/اخبار"
      proxySecret:
        description: 'X-Proxy-Secret header value expected by the Worker'
        required: true
        type: string

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch aja.ir through the Cloudflare Worker proxy
        run: node scripts/debug-aja-proxy.mjs "${{ inputs.workerUrl }}" "${{ inputs.targetUrl }}" "${{ inputs.proxySecret }}"

      - name: TEMP - install dependencies
        run: npm install

      - name: TEMP - run article-structure investigation script
        run: node scripts/debug-aja-article-structure.mjs "${{ inputs.proxySecret }}" "${{ inputs.workerUrl }}"
