<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>داشبورد نصر ۲ — نسخه موبایل</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
  :root{
    --bg-0:#080b0f;
    --bg-1:#0e131a;
    --bg-2:#141b24;
    --bg-3:#1b2530;
    --line:#232e3d;
    --line-soft:#1a2330;
    --text-0:#eef2f6;
    --text-1:#aab6c4;
    --text-2:#6c7889;
    --amber:#d99a3f;
    --amber-dim:#8a6a3a;
    --red:#c9503f;
    --rust:#b8683f;
    --sheet-peek: 128px;
    --sheet-expanded: 78vh;
    --safe-b: env(safe-area-inset-bottom, 0px);
    --safe-t: env(safe-area-inset-top, 0px);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;overscroll-behavior:none;}
  body{
    background:var(--bg-0);
    color:var(--text-0);
    font-family:'Vazirmatn',Tahoma,sans-serif;
    overflow:hidden;
    position:fixed;
    inset:0;
  }

  /* ---------------- Map layer ---------------- */
  #map{position:fixed;inset:0;z-index:1;background:var(--bg-0);}
  .leaflet-container{background:var(--bg-0);font-family:'Vazirmatn',Tahoma,sans-serif;}
  .leaflet-control-zoom{display:none;}

  /* ---------------- Top bar ---------------- */
  .topbar{
    position:fixed;top:0;right:0;left:0;z-index:600;
    padding:calc(10px + var(--safe-t)) 14px 10px;
    background:linear-gradient(180deg, rgba(8,11,15,.94), rgba(8,11,15,.55) 70%, transparent);
    display:flex;align-items:center;justify-content:space-between;gap:10px;
  }
  .tb-brand{display:flex;align-items:center;gap:9px;min-width:0;}
  .tb-mark{
    width:32px;height:32px;border-radius:8px;flex-shrink:0;
    background:radial-gradient(circle at 30% 30%, var(--amber), var(--rust) 70%);
    display:flex;align-items:center;justify-content:center;
    font-weight:800;font-size:12.5px;color:#14100a;
  }
  .tb-title{min-width:0;}
  .tb-title h1{font-size:13.5px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .tb-title p{font-size:10px;color:var(--text-2);margin-top:1px;white-space:nowrap;}
  .tb-live{
    display:flex;align-items:center;gap:5px;flex-shrink:0;
    font-size:10px;color:var(--text-1);
    background:rgba(20,27,36,.9);border:1px solid var(--line);border-radius:20px;
    padding:6px 10px;
  }
  .dot-pulse{width:6px;height:6px;border-radius:50%;background:var(--red);animation:pulse 2s infinite;}
  @keyframes pulse{
    0%{box-shadow:0 0 0 0 rgba(201,80,63,.55);}
    70%{box-shadow:0 0 0 7px rgba(201,80,63,0);}
    100%{box-shadow:0 0 0 0 rgba(201,80,63,0);}
  }

  /* ---------------- Filter toggle chip on map ---------------- */
  .filter-fab{
    position:fixed;z-index:600;
    top:calc(64px + var(--safe-t));
    left:14px;
    width:40px;height:40px;border-radius:12px;
    background:rgba(20,27,36,.92);border:1px solid var(--line);
    display:flex;align-items:center;justify-content:center;
    color:var(--text-1);font-size:16px;
  }
  .filter-fab.active{color:var(--amber);border-color:var(--amber-dim);}

  .mode-fab{
    position:fixed;z-index:600;
    top:calc(64px + var(--safe-t));
    left:64px;
    display:flex;background:rgba(20,27,36,.92);
    border:1px solid var(--line);border-radius:12px;overflow:hidden;
    font-size:10.5px;
  }
  .mode-fab div{padding:10px 10px;color:var(--text-2);}
  .mode-fab div.active{background:var(--bg-3);color:var(--amber);}

  /* ---------------- Selected event floating card ---------------- */
  .sel-card{
    position:fixed;z-index:650;
    right:14px;left:14px;
    bottom:calc(var(--sheet-peek) + 14px + var(--safe-b));
    background:rgba(14,19,26,.97);
    border:1px solid var(--line);
    border-radius:14px;
    padding:14px 14px 12px;
    box-shadow:0 16px 40px -10px rgba(0,0,0,.65);
    display:none;
    transition:bottom .25s;
  }
  .sel-card.show{display:block;}
  .sc-close{position:absolute;left:10px;top:10px;width:26px;height:26px;display:flex;align-items:center;justify-content:center;color:var(--text-2);font-size:15px;}
  .sc-country{font-size:10.5px;color:var(--amber);margin-bottom:3px;letter-spacing:.3px;}
  .sc-title{font-size:15px;font-weight:700;line-height:1.5;margin-bottom:9px;padding-left:26px;}
  .sc-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:9px;}
  .sc-field span{display:block;font-size:9.5px;color:var(--text-2);margin-bottom:1px;}
  .sc-field b{font-size:12px;font-weight:600;}
  .sc-desc{font-size:11.5px;line-height:1.8;color:var(--text-1);border-top:1px solid var(--line-soft);padding-top:8px;}
  .sc-code{font-size:10px;color:var(--text-2);margin-top:8px;}

  /* ---------------- Bottom sheet ---------------- */
  .sheet{
    position:fixed;right:0;left:0;bottom:0;z-index:640;
    height:var(--sheet-peek);
    background:var(--bg-1);
    border-top:1px solid var(--line);
    border-radius:18px 18px 0 0;
    box-shadow:0 -10px 30px -10px rgba(0,0,0,.5);
    transition:height .28s cubic-bezier(.2,.8,.3,1);
    display:flex;flex-direction:column;
    overflow:hidden;
    touch-action:none;
  }
  .sheet.expanded{height:var(--sheet-expanded);}

  .sheet-handle{
    padding:10px 0 6px;display:flex;flex-direction:column;align-items:center;gap:8px;
    flex-shrink:0;
  }
  .handle-bar{width:36px;height:4px;border-radius:3px;background:var(--line);}
  .sheet-summary{
    width:100%;padding:0 16px;display:flex;align-items:center;justify-content:space-between;
  }
  .ss-date{display:flex;align-items:baseline;gap:8px;}
  .ss-date b{font-size:14.5px;}
  .ss-date span{font-size:10.5px;color:var(--text-2);}
  .ss-controls{display:flex;gap:6px;}
  .ss-btn{
    width:34px;height:34px;border-radius:9px;border:1px solid var(--line);
    background:var(--bg-2);color:var(--text-1);
    display:flex;align-items:center;justify-content:center;font-size:13px;
  }
  .ss-btn.playing{color:var(--amber);border-color:var(--amber-dim);}

  .date-scroll{
    display:flex;gap:8px;overflow-x:auto;padding:10px 16px 12px;flex-shrink:0;
    -webkit-overflow-scrolling:touch;
  }
  .date-scroll::-webkit-scrollbar{display:none;}
  .date-pill{
    flex-shrink:0;
    padding:8px 14px;border-radius:20px;
    border:1px solid var(--line);
    background:var(--bg-2);
    font-size:12px;color:var(--text-1);
    display:flex;flex-direction:column;align-items:center;gap:2px;
    min-width:64px;
  }
  .date-pill b{font-size:9px;font-weight:400;color:var(--text-2);}
  .date-pill.active{background:linear-gradient(135deg,var(--amber),var(--rust));color:#14100a;border-color:transparent;}
  .date-pill.active b{color:#2a1c0c;}
  .date-pill.past{border-color:var(--amber-dim);}

  .sheet-body{
    flex:1;overflow-y:auto;min-height:0;
    padding:0 16px calc(20px + var(--safe-b));
    -webkit-overflow-scrolling:touch;
  }
  .sheet-section{padding:12px 0;border-bottom:1px solid var(--line-soft);}
  .sheet-section-title{font-size:11px;color:var(--text-2);margin-bottom:10px;letter-spacing:.3px;}

  .chip-row{display:flex;gap:8px;overflow-x:auto;padding-bottom:2px;}
  .chip-row::-webkit-scrollbar{display:none;}
  .chip{
    flex-shrink:0;
    font-size:12.5px;padding:8px 13px;border-radius:20px;
    border:1px solid var(--line);background:var(--bg-2);color:var(--text-1);
    display:flex;align-items:center;gap:7px;
  }
  .chip .sw{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
  .chip.active{background:var(--bg-3);color:var(--text-0);border-color:currentColor;}
  .chip-count{color:var(--text-2);font-size:10.5px;}

  .force-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;}
  .force-btn{
    text-align:center;padding:9px 4px;font-size:11.5px;border-radius:9px;
    border:1px solid var(--line);background:var(--bg-2);color:var(--text-1);
  }
  .force-btn.active{background:var(--bg-3);color:var(--amber);border-color:var(--amber-dim);}

  .event-card{
    padding:12px 13px;border:1px solid var(--line-soft);border-radius:11px;
    margin-bottom:9px;background:var(--bg-2);
  }
  .event-card.selected{border-color:var(--amber-dim);background:var(--bg-3);}
  .ec-top{display:flex;justify-content:space-between;font-size:10.5px;color:var(--text-2);margin-bottom:6px;}
  .ec-wave{padding:1px 8px;border-radius:20px;border:1px solid var(--line);}
  .ec-loc{font-size:14px;font-weight:600;margin-bottom:4px;display:flex;align-items:center;gap:7px;}
  .ec-country-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
  .ec-target{font-size:12px;color:var(--text-1);line-height:1.7;}

  .empty-note{padding:24px 4px;text-align:center;color:var(--text-2);font-size:12.5px;line-height:2;}

  .stat-row{display:flex;gap:8px;}
  .stat-mini{
    flex:1;text-align:center;padding:10px 4px;border:1px solid var(--line);border-radius:10px;background:var(--bg-2);
  }
  .stat-mini b{display:block;font-size:16px;color:var(--amber);}
  .stat-mini span{font-size:9.5px;color:var(--text-2);}
</style>
</head>
<body>

<div id="map"></div>

<div class="topbar">
  <div class="tb-brand">
    <div class="tb-mark">ن۲</div>
    <div class="tb-title">
      <h1>پایش عملیات «نصر ۲»</h1>
      <p>سپاه‌نیوز — نسخه موبایل</p>
    </div>
  </div>
  <div class="tb-live"><span class="dot-pulse"></span>۱۲–۲۶ تیر</div>
</div>

<div class="filter-fab" id="filterFab">☰</div>
<div class="mode-fab" id="modeFab">
  <div class="active" data-mode="cumulative">تجمعی</div>
  <div data-mode="single">امروز</div>
</div>

<div class="sel-card" id="selCard">
  <div class="sc-close" id="scClose">✕</div>
  <div class="sc-country" id="scCountry"></div>
  <div class="sc-source" id="scSource" style="font-size:10px;color:var(--text-2);margin-bottom:6px;"></div>
  <div class="sc-title" id="scTitle"></div>
  <div class="sc-grid">
    <div class="sc-field"><span>تاریخ</span><b id="scDate"></b></div>
    <div class="sc-field"><span>موج/مرحله</span><b id="scWave"></b></div>
    <div class="sc-field"><span>نیرو</span><b id="scForce"></b></div>
    <div class="sc-field"><span>سلاح ادعایی</span><b id="scWeapon"></b></div>
  </div>
  <div class="sc-desc" id="scDesc"></div>
  <div class="sc-code" id="scCode"></div>
</div>

<div class="sheet" id="sheet">
  <div class="sheet-handle" id="sheetHandle">
    <div class="handle-bar"></div>
    <div class="sheet-summary">
      <div class="ss-date">
        <b id="ssDate">—</b>
        <span id="ssMeta">—</span>
      </div>
      <div class="ss-controls">
        <div class="ss-btn" id="ssPrev">◀</div>
        <div class="ss-btn" id="ssPlay">▶</div>
        <div class="ss-btn" id="ssNext">▶</div>
      </div>
    </div>
  </div>

  <div class="date-scroll" id="dateScroll"></div>

  <div class="sheet-body" id="sheetBody">
    <div class="sheet-section">
      <div class="stat-row" id="statRow"></div>
    </div>
    <div class="sheet-section" id="filterSourceSection">
      <div class="sheet-section-title">فیلتر منبع بیانیه</div>
      <div class="chip-row" id="sourceChips"></div>
    </div>
    <div class="sheet-section" id="filterCountrySection">
      <div class="sheet-section-title">فیلتر کشور هدف</div>
      <div class="chip-row" id="countryChips"></div>
    </div>
    <div class="sheet-section" id="filterForceSection">
      <div class="sheet-section-title">فیلتر نیروی عامل</div>
      <div class="force-grid" id="forceToggle"></div>
    </div>
    <div class="sheet-section" style="border-bottom:none;">
      <div class="sheet-section-title">رویدادهای این تاریخ (<span id="listCount">۰</span>)</div>
      <div id="eventList"></div>
    </div>
  </div>
</div>

<script>
/* =========================================================
   داده‌ها — همان دیتاست نسخهٔ دسکتاپ داشبورد نصر ۲
   نکته: تمام موارد ادعای رسمی سپاه پاسداران است و راستی‌آزمایی
   مستقل ندارد — این داشبورد صرفاً بازتاب محتوای اطلاعیه‌هاست.

  salamah:      {name:'صخره‌های سلامه',           country:'oman', lat:23.5880, lng:58.5450},
  tanf:         {name:'پایگاه التنف',             country:'syria', lat:33.4864, lng:38.2131},
  hormuz:       {name:'تنگه هرمز',               country:'hormuz', lat:26.5000, lng:56.2500},
  northIndianOcean: {name:'شمال اقیانوس هند',     country:'hormuz', lat:15.0000, lng:65.0000},
  bandarAbbas:  {name:'بندرعباس (پدافند هوایی)',  country:'iran', lat:27.1865, lng:56.2808},
};

const COUNTRY = {
  jordan:  {label:'اردن',  color:'#c9503f'},
  kuwait:  {label:'کویت',  color:'#d99a3f'},
  bahrain: {label:'بحرین', color:'#3a9188'},
  qatar:   {label:'قطر',   color:'#8b6fb0'},
  oman:    {label:'عمان',  color:'#4d80c9'},
  syria:   {label:'سوریه', color:'#b8683f'},
  hormuz:  {label:'تنگه هرمز / دریای عمان', color:'#5c6b7d'},
  iran:    {label:'ایران (پدافند داخلی)', color:'#4f9d6e'},

const SOURCE = {
  sepah:  {label:'سپاه پاسداران (عملیات نصر ۲)', short:'سپاه'},
  artesh: {label:'ارتش جمهوری اسلامی (عملیات صاعقه)', short:'ارتش'},
};

const FORCE = {
  ground:    'زمینی',
  naval:     'دریایی',
  aerospace: 'هوافضا',
  joint:     'مشترک',
  unknown:   'نامشخص',
};

function ev(id, dateG, dateP, time, wave, force, loc, target, weapon, outcome, code, source){
  return {id, dateG, dateP, time, wave, force, source: source || 'sepah',
          country: LOC[loc].country, locName: LOC[loc].name,
          lat: LOC[loc].lat, lng: LOC[loc].lng,
          target, weapon, outcome, code};
}

const EVENTS = [
  ev(1,'2026-07-08','۱۷ تیر ۱۴۰۵','۰۷:۰۰','پاسخ اولیه','joint','minaSalman',
     'تأسیسات نظامی در منطقه پنجم دریایی و بندر سلمان','موشک و پهپاد (عملیات مشترک ۸۵ نقطه‌ای)','ادعای انهدام بخشی از تأسیسات','۳۶۰۲۴'),

  ev(5,'2026-07-09','۱۸ تیر ۱۴۰۵','۰۵:۳۶','مرحله ۱','joint','jufair',
     'زیرساخت پایگاه جفیر','موشک و پهپاد','ادعای انهدام زیرساخت','۳۶۰۲۸'),
  ev(6,'2026-07-09','۱۸ تیر ۱۴۰۵','۰۵:۳۶','مرحله ۱','joint','sheikhIsa',
     'زیرساخت پایگاه شیخ عیسی','موشک و پهپاد','ادعای انهدام زیرساخت','۳۶۰۲۸'),
  ev(7,'2026-07-09','۱۸ تیر ۱۴۰۵','۱۶:۲۸','مرحله ۲','aerospace','alAzraq',
     'مرکز فرماندهی‌وکنترل و پایگاه هوایی الازرق','۱۰ فروند موشک بالستیک','ادعای انهدام مرکز فرماندهی','۳۶۰۳۶'),

const DATES = [...new Set(EVENTS.map(e=>e.dateG))].sort();
const DATE_LABEL = {};
EVENTS.forEach(e=>DATE_LABEL[e.dateG]=e.dateP);

/* ---------------- state ---------------- */
let state = {
  dateIdx: DATES.length-1,
  mode: 'cumulative',
  countries: new Set(Object.keys(COUNTRY)),
  forces: new Set(Object.keys(FORCE)),
  sources: new Set(Object.keys(SOURCE)),
  selectedId: null,
  playing: false,
  playTimer: null,
  expanded: false,
};

/* ---------------- map init ---------------- */
const map = L.map('map', {zoomControl:false, attributionControl:false})
  .setView([27.5, 49.5], 5.4);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  subdomains:'abcd', maxZoom:12, minZoom:3
}).addTo(map);

let markerLayer = L.layerGroup().addTo(map);
let markersById = {};

function countryColor(c){ return (COUNTRY[c]||{}).color || '#888'; }

function makeIcon(country, active, source){
  const c = countryColor(country);
  const size = active? 26:19;
  const glow = active? 0.2 : 0.08;
  const shadow = `0 0 0 ${active?5:2}px rgba(255,255,255,${glow}), 0 0 16px ${c}${active?'aa':'55'}`;
  const shape = source==='artesh'
    ? `width:${size}px;height:${size}px;background:${c};box-shadow:${shadow};border:2px solid rgba(255,255,255,.8);transform:rotate(45deg);border-radius:4px;`
    : `width:${size}px;height:${size}px;border-radius:50%;background:${c};box-shadow:${shadow};border:2px solid rgba(255,255,255,.8);`;
  return L.divIcon({
    className:'',
    html:`<div style="${shape}"></div>`,
    iconSize:[size,size], iconAnchor:[size/2,size/2]
  });
}

/* ---------------- filtering ---------------- */
function visibleEvents(){
  const curDate = DATES[state.dateIdx];
  return EVENTS.filter(e=>{
    if(!state.countries.has(e.country)) return false;
    if(!state.forces.has(e.force)) return false;
    if(!state.sources.has(e.source)) return false;
    if(state.mode==='single') return e.dateG===curDate;
    return e.dateG<=curDate;
  });
}
function todaysEvents(){
  const curDate = DATES[state.dateIdx];
  return EVENTS.filter(e=> e.dateG===curDate && state.countries.has(e.country) && state.forces.has(e.force) && state.sources.has(e.source));
}

/* ---------------- render: stat row ---------------- */
function renderStats(){
  const total = EVENTS.length;
  const countries = new Set(EVENTS.map(e=>e.country)).size;
  const waves = new Set(EVENTS.map(e=>e.wave)).size;
  document.getElementById('statRow').innerHTML = `
    <div class="stat-mini"><b>${total}</b><span>کل رویدادها</span></div>
    <div class="stat-mini"><b>${countries}</b><span>کشور هدف</span></div>
    <div class="stat-mini"><b>${DATES.length}</b><span>روز فعال</span></div>
    <div class="stat-mini"><b>${waves}</b><span>موج/مرحله</span></div>
  `;
}

/* ---------------- render: date scroller ---------------- */
function renderDateScroll(){
  const wrap = document.getElementById('dateScroll');
  wrap.innerHTML = '';
  DATES.forEach((d,i)=>{
    const count = EVENTS.filter(e=>e.dateG===d).length;
    const pill = document.createElement('div');
    pill.className = 'date-pill' + (i===state.dateIdx?' active': i<state.dateIdx?' past':'');
    pill.innerHTML = `${DATE_LABEL[d].replace(' ۱۴۰۵','')}<b>${count} رویداد</b>`;
    pill.onclick = ()=>{ state.dateIdx = i; renderAll(); };
    wrap.appendChild(pill);
  });
  const activeEl = wrap.querySelector('.date-pill.active');
  if(activeEl) activeEl.scrollIntoView({inline:'center', block:'nearest', behavior:'smooth'});
}

/* ---------------- render: chips ---------------- */
function renderSourceChips(){
  const wrap = document.getElementById('sourceChips');
  wrap.innerHTML='';
  Object.keys(SOURCE).forEach(key=>{
    const count = EVENTS.filter(e=>e.source===key).length;
    const chip = document.createElement('div');
    chip.className = 'chip' + (state.sources.has(key)?' active':'');
    chip.innerHTML = `<span class="sw" style="background:${key==='artesh'?'#4d80c9':'#d99a3f'}; border-radius:${key==='artesh'?'2px':'50%'}; transform:${key==='artesh'?'rotate(45deg)':'none'};"></span>${SOURCE[key].label}<span class="chip-count">${count}</span>`;
    chip.onclick = ()=>{
      if(state.sources.has(key)) state.sources.delete(key); else state.sources.add(key);
      renderSourceChips(); renderAll();
    };
    wrap.appendChild(chip);
  });
}

function renderChips(){
  const wrap = document.getElementById('countryChips');
  wrap.innerHTML='';
  Object.keys(COUNTRY).forEach(key=>{
    const count = EVENTS.filter(e=>e.country===key).length;
    const chip = document.createElement('div');
    chip.className = 'chip' + (state.countries.has(key)?' active':'');
    chip.style.color = COUNTRY[key].color;
    chip.innerHTML = `<span class="sw" style="background:${COUNTRY[key].color}"></span>${COUNTRY[key].label}<span class="chip-count">${count}</span>`;
    chip.onclick = ()=>{
      if(state.countries.has(key)) state.countries.delete(key); else state.countries.add(key);
      renderChips(); renderAll();
    };
    wrap.appendChild(chip);
  });
}

function renderForceToggle(){
  const wrap = document.getElementById('forceToggle');
  wrap.innerHTML='';
  Object.keys(FORCE).filter(k=>k!=='unknown').forEach(key=>{
    const btn = document.createElement('div');
    btn.className = 'force-btn' + (state.forces.has(key)?' active':'');
    btn.textContent = FORCE[key];
    btn.onclick = ()=>{
      if(state.forces.has(key)) state.forces.delete(key); else state.forces.add(key);
      state.forces.add('unknown');
      renderForceToggle(); renderAll();
    };
    wrap.appendChild(btn);
  });
}

/* ---------------- render: markers ---------------- */
function renderMarkers(){
  markerLayer.clearLayers();
  markersById = {};
  const evs = visibleEvents();
  const todaySet = new Set(todaysEvents().map(e=>e.id));

  evs.forEach(e=>{
    const active = todaySet.has(e.id) || e.id===state.selectedId;
    const marker = L.marker([e.lat, e.lng], {icon: makeIcon(e.country, active, e.source)});
    marker.on('click', ()=>selectEvent(e.id));
    marker.addTo(markerLayer);
    markersById[e.id] = marker;
  });
}

/* ---------------- render: event list ---------------- */
function renderEventList(){
  const list = document.getElementById('eventList');
  const evs = todaysEvents();
  document.getElementById('listCount').textContent = evs.length;

  if(evs.length===0){
    list.innerHTML = `<div class="empty-note">در این تاریخ، با فیلترهای فعلی رویدادی ثبت نشده است.</div>`;
    return;
  }
  list.innerHTML = evs.map(e=>`
    <div class="event-card ${e.id===state.selectedId?'selected':''}" data-id="${e.id}">
      <div class="ec-top">
        <span>${e.time || ''}</span>
        <span class="ec-wave">${SOURCE[e.source].short} · ${e.wave || '—'}</span>
      </div>
      <div class="ec-loc"><span class="ec-country-dot" style="background:${countryColor(e.country)}"></span>${e.locName}</div>
      <div class="ec-target">${e.target}</div>
    </div>
  `).join('');

  list.querySelectorAll('.event-card').forEach(card=>{
    card.onclick = ()=> selectEvent(parseInt(card.dataset.id));
  });
}

/* ---------------- selection card ---------------- */
function selectEvent(id){
  state.selectedId = id;
  const e = EVENTS.find(x=>x.id===id);
  if(!e) return;

  document.getElementById('scCountry').textContent = COUNTRY[e.country].label;
  document.getElementById('scCountry').style.color = COUNTRY[e.country].color;
  document.getElementById('scSource').textContent = SOURCE[e.source].label;
  document.getElementById('scTitle').textContent = e.locName;
  document.getElementById('scDate').textContent = `${e.dateP}${e.time? ' — '+e.time:''}`;
  document.getElementById('scWave').textContent = e.wave || '—';
  document.getElementById('scForce').textContent = FORCE[e.force] || 'نامشخص';
  document.getElementById('scWeapon').textContent = e.weapon || '—';
  document.getElementById('scDesc').textContent = `هدف ادعایی: ${e.target}. نتیجه اعلام‌شده: ${e.outcome}`;
  document.getElementById('scCode').textContent = e.code
    ? `کد خبر سپاه‌نیوز: ${e.code}`
    : `منبع: روابط عمومی ارتش جمهوری اسلامی ایران (${e.dateP})`;
  document.getElementById('selCard').classList.add('show');

  collapseSheet();

  if(DATES.includes(e.dateG)){
    const idx = DATES.indexOf(e.dateG);
    if(idx !== state.dateIdx){ state.dateIdx = idx; renderAll(); }
    else { renderMarkers(); renderEventList(); }
  }

  const m = markersById[id];
  if(m){ map.flyTo(m.getLatLng(), Math.max(map.getZoom(), 6.5), {duration:0.6}); }
}

document.getElementById('scClose').onclick = ()=>{
  state.selectedId = null;
  document.getElementById('selCard').classList.remove('show');
  renderMarkers(); renderEventList();
};

/* ---------------- bottom sheet expand/collapse ---------------- */
const sheet = document.getElementById('sheet');
function expandSheet(){ state.expanded = true; sheet.classList.add('expanded'); setTimeout(()=>map.invalidateSize(),300); }
function collapseSheet(){ state.expanded = false; sheet.classList.remove('expanded'); setTimeout(()=>map.invalidateSize(),300); }
function toggleSheet(){ state.expanded ? collapseSheet() : expandSheet(); }

document.getElementById('sheetHandle').addEventListener('click', toggleSheet);
document.getElementById('filterFab').addEventListener('click', ()=>{
  expandSheet();
  document.getElementById('filterFab').classList.add('active');
});

/* simple swipe on handle */
let touchStartY = null;
document.getElementById('sheetHandle').addEventListener('touchstart', e=>{
  touchStartY = e.touches[0].clientY;
}, {passive:true});
document.getElementById('sheetHandle').addEventListener('touchend', e=>{
  if(touchStartY===null) return;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if(dy < -20) expandSheet();
  else if(dy > 20) collapseSheet();
  touchStartY = null;
});

/* ---------------- mode toggle ---------------- */
document.querySelectorAll('#modeFab div').forEach(btn=>{
  btn.onclick = ()=>{
    document.querySelectorAll('#modeFab div').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    state.mode = btn.dataset.mode;
    renderAll();
  };
});

/* ---------------- prev/next/play ---------------- */
document.getElementById('ssPrev').onclick = (e)=>{
  e.stopPropagation();
  state.dateIdx = Math.max(0, state.dateIdx-1); renderAll();
};
document.getElementById('ssNext').onclick = (e)=>{
  e.stopPropagation();
  state.dateIdx = Math.min(DATES.length-1, state.dateIdx+1); renderAll();
};
document.getElementById('ssPlay').onclick = function(e){
  e.stopPropagation();
  if(state.playing){
    state.playing = false;
    clearInterval(state.playTimer);
    this.classList.remove('playing');
    this.textContent = '▶';
    return;
  }
  state.playing = true;
  this.classList.add('playing');
  this.textContent = '❚❚';
  state.playTimer = setInterval(()=>{
    state.dateIdx++;
    if(state.dateIdx >= DATES.length){
      state.dateIdx = DATES.length-1;
      document.getElementById('ssPlay').click();
    }
    renderAll();
  }, 1400);
};

/* ---------------- master render ---------------- */
function renderAll(){
  renderMarkers();
  renderEventList();
  renderDateScroll();
  const curDate = DATES[state.dateIdx];
  document.getElementById('ssDate').textContent = DATE_LABEL[curDate];
  const dayCount = todaysEvents().length;
  const cumCount = visibleEvents().length;
  document.getElementById('ssMeta').textContent = `${dayCount} رویداد امروز · ${cumCount} تجمعی`;
}

renderStats();
renderSourceChips();
renderChips();
renderForceToggle();
renderAll();

/* Leaflet sizing fix — container may be 0×0 at first paint */
function fixMapSize(){ map.invalidateSize(); }
window.addEventListener('resize', fixMapSize);
setTimeout(fixMapSize, 50);
setTimeout(fixMapSize, 300);
setTimeout(fixMapSize, 1000);
if(document.fonts && document.fonts.ready){ document.fonts.ready.then(fixMapSize); }
</script>
